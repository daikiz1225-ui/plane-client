<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Googlo デバッグ・管理パネル</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #4CAF50; font-size: 22px; }
        .auth-box { background: #1a1a1a; padding: 15px; border-radius: 6px; border: 1px solid #333; margin-bottom: 20px; }
        input { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; width: 200px; }
        button { background: #4CAF50; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #45a049; }
        .user-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .user-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; margin-bottom: 10px; padding-right: 140px; }
        .username { font-size: 18px; color: #2196F3; }
        .pass-hash { font-size: 11px; color: #666; font-family: monospace; }
        .delete-btn { position: absolute; top: 15px; right: 15px; background: #ff5252; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .delete-btn:hover { background: #e04040; }
        .section-title { font-size: 13px; color: #aaa; margin: 10px 0 5px 0; font-weight: bold; }
        ul { margin: 0; padding-left: 20px; max-height: 150px; overflow-y: auto; background: #222; padding: 10px; border-radius: 4px; list-style-type: square; }
        li { font-size: 13px; color: #ccc; margin-bottom: 4px; }
        .empty { color: #555; font-style: italic; font-size: 12px; list-style: none; padding-left: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Googlo サーバーデータ確認パネル（削除機能付き）</h1>
        
        <div class="auth-box">
            <label for="secret-input">管理者の合言葉: </label>
            <input type="password" id="secret-input" placeholder="合言葉を入力">
            <button id="load-btn">データ読み込み</button>
        </div>

        <div id="data-display-area"></div>
    </div>

    <script>
        function extractName(obj, isHistory = false) {
            if (!obj) return "不明なデータ";
            if (typeof obj !== 'object') return String(obj);

            if (isHistory) {
                if (obj.snippet && obj.snippet.title) return obj.snippet.title;
                return obj.title || obj.name || JSON.stringify(obj);
            } else {
                return obj.name || obj.title || obj.author || JSON.stringify(obj);
            }
        }

        // 📋 データをサーバーから読み込んで描画する関数
        async function loadServerData() {
            const secret = document.getElementById('secret-input').value;
            const displayArea = document.getElementById('data-display-area');
            displayArea.innerHTML = "<p>読み込み中...</p>";

            try {
                const response = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret })
                });
                const result = await response.json();

                if (!result.success) {
                    displayArea.innerHTML = `<p style="color:#ff5252;">エラー: ${result.error}</p>`;
                    return;
                }

                if (result.data.length === 0) {
                    displayArea.innerHTML = "<p>まだアカウントは1つも作成されていません。</p>";
                    return;
                }

                let html = "";
                result.data.forEach(user => {
                    let historyHTML = "";
                    const history = user.backupData.yt_history || [];
                    if (history.length === 0) {
                        historyHTML = '<li class="empty">視聴履歴なし、または未同期</li>';
                    } else {
                        history.forEach(item => {
                            historyHTML += `<li>${extractName(item, true)}</li>`;
                        });
                    }

                    let subHTML = "";
                    const subs = user.backupData.yt_subs || [];
                    if (subs.length === 0) {
                        subHTML = '<li class="empty">登録チャンネルなし、または未同期</li>';
                    } else {
                        subs.forEach(sub => {
                            subHTML += `<li>${extractName(sub, false)}</li>`;
                        });
                    }

                    html += `
                        <div class="user-card">
                            <button class="delete-btn" onclick="deleteUser('${user.username}')">❌ アカウント削除</button>
                            <div class="user-header">
                                <div class="username">👤 ユーザー名: <strong>${user.username}</strong></div>
                                <div class="pass-hash">暗号化パスワード: ${user.passwordHash}</div>
                            </div>
                            
                            <div class="section-title">📺 最近見ている動画履歴 (${history.length}件)</div>
                            <ul>${historyHTML}</ul>
                            
                            <div class="section-title">📌 登録中のチャンネル (${subs.length}件)</div>
                            <ul>${subHTML}</ul>
                        </div>
                    `;
                });

                displayArea.innerHTML = html;

            } catch (e) {
                displayArea.innerHTML = `<p style="color:#ff5252;">通信エラーが発生しました</p>`;
            }
        }

        // 🗑️ 特定のユーザーを削除する関数
        async function deleteUser(username) {
            const secret = document.getElementById('secret-input').value;
            
            if (!confirm(`⚠️ 本当にユーザー「${username}」をサーバーから完全に削除しますか？\nこの操作は取り消せません。`)) {
                return;
            }

            try {
                const response = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, action: 'delete', usernameToDelete: username })
                });
                const result = await response.json();

                if (result.success) {
                    alert(result.message);
                    loadServerData(); // 削除完了後、一覧を自動で再読み込み
                } else {
                    alert(`削除失敗: ${result.error}`);
                }
            } catch (e) {
                alert("削除通信中にエラーが発生しました");
            }
        }

        // ボタンのクリックイベント紐付け
        document.getElementById('load-btn').onclick = loadServerData;
    </script>
</body>
</html>
