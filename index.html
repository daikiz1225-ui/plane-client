<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Battle Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #login-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #game-canvas { display: block; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(255,0,0,0.5); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; pointer-events: auto; user-select: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>Sky Battle Online</h1>
    <input type="text" id="username" placeholder="名前を入力" style="font-size: 20px; padding: 10px;">
    <select id="plane-type" style="font-size: 20px; margin: 10px; padding: 10px;">
        <option value="NORMAL">ノーマル機</option>
        <option value="POWER">火力機</option>
        <option value="SPEED">スピード機</option>
        <option value="MOTHER">母艦</option>
        <option value="HELI">ヘリ</option>
    </select>
    <button onclick="startGame()" style="font-size: 20px; padding: 10px 40px;">スタート！</button>
</div>

<canvas id="game-canvas"></canvas>

<div class="controls">
    <div id="joystick" class="joystick-base"></div>
    <div id="shoot-btn" class="btn">ATTACK</div>
</div>

<script>
    const socket = io("https://plane-server.onrender.com/");
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    let myId = null;
    let gameState = { players: {}, bullets: [], boss: {} };

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function startGame() {
        const name = document.getElementById('username').value || "Player";
        const type = document.getElementById('plane-type').value;
        socket.emit('login', { name, type });
        document.getElementById('login-screen').style.display = 'none';
        myId = socket.id;
    }

    // サーバーからのデータ受信
    socket.on('gameUpdate', (data) => {
        gameState = data;
        draw();
    });

    // ジョイスティック簡易実装（iPadのタッチ用）
    const joy = document.getElementById('joystick');
    joy.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const rect = joy.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
        
        // 角度をサーバーへ送信
        socket.emit('input', { angle: angle });
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // プレイヤーの描画
        Object.values(gameState.players).forEach(p => {
            ctx.save();
            ctx.translate(p.x, p.y); // 本来は自分中心にスクロールさせるが、まずは絶対座標でテスト
            ctx.rotate(p.angle);
            
            // 飛行機（簡易的な三角形）
            ctx.fillStyle = p.id === socket.id ? 'blue' : 'red';
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-10, -10);
            ctx.lineTo(-10, 10);
            ctx.fill();
            
            // 名前
            ctx.restore();
            ctx.fillStyle = 'black';
            ctx.fillText(p.name, p.x - 10, p.y - 20);
        });
    }
</script>
</body>
</html>
